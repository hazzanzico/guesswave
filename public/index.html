<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <title>GuessWave</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- FIX 4: Socket.io reconnection options set in JS below -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --ink: #0d0f0a;
        --ink2: #131610;
        --ink3: #1b1f17;
        --ink4: #23271e;
        --line: #2c3127;
        --line2: #3a4034;
        --lime: #c8f135;
        --coral: #ff5e5b;
        --sky: #38bdf8;
        --amber: #fbbf24;
        --violet: #a78bfa;
        --green: #34d399;
        --text: #e8ead8;
        --text2: #8a9280;
        --text3: #56624e;
        --sans: "DM Sans", sans-serif;
        --mono: "DM Mono", monospace;
        --disp: "Syne", sans-serif;
        --r-sm: 6px;
        --r-md: 10px;
        --r-lg: 16px;
        --r-xl: 24px;
      }

      html,
      body {
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: var(--ink);
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.5;
      }
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line2);
        border-radius: 3px;
      }
      .hidden {
        display: none !important;
      }

      input {
        width: 100%;
        background: var(--ink3);
        border: 1.5px solid var(--line);
        border-radius: var(--r-md);
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        padding: 11px 14px;
        outline: none;
        transition:
          border-color 0.18s,
          background 0.18s;
        min-height: 44px;
      }
      input:focus {
        border-color: var(--lime);
        background: var(--ink2);
      }
      input::placeholder {
        color: var(--text3);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border: none;
        border-radius: var(--r-md);
        cursor: pointer;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 600;
        padding: 11px 22px;
        transition: all 0.18s;
        white-space: nowrap;
        min-height: 44px;
      }
      .btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none !important;
      }
      .btn-lime {
        background: var(--lime);
        color: var(--ink);
      }
      .btn-lime:hover:not(:disabled) {
        background: #d6fa3a;
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: transparent;
        border: 1.5px solid var(--line);
        color: var(--text2);
      }
      .btn-ghost:hover:not(:disabled) {
        border-color: var(--lime);
        color: var(--lime);
      }
      .btn-ready {
        background: var(--ink3);
        border: 1.5px solid var(--line);
        color: var(--text2);
        min-height: 44px;
      }
      .btn-ready.is-ready {
        background: rgba(200, 241, 53, 0.12);
        border-color: var(--lime);
        color: var(--lime);
      }
      .btn-ready:hover:not(:disabled) {
        border-color: var(--lime);
        color: var(--lime);
      }
      .btn-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        flex-shrink: 0;
        background: var(--lime);
        color: var(--ink);
        border: none;
        border-radius: var(--r-md);
        cursor: pointer;
        font-size: 18px;
        transition: all 0.18s;
      }
      .btn-icon:hover:not(:disabled) {
        background: #d6fa3a;
      }
      .btn-icon:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* ══ LANDING ══════════════════════════════════════════════════════════ */
      #landing {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100dvh;
        gap: 2rem;
        padding: 1.25rem;
        position: relative;
        overflow: hidden;
      }
      #landing::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 60px 60px;
        opacity: 0.1;
        pointer-events: none;
      }
      #landing::after {
        content: "";
        position: absolute;
        top: -120px;
        right: -120px;
        width: 460px;
        height: 460px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(200, 241, 53, 0.08) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .blob2 {
        position: absolute;
        bottom: -100px;
        left: -100px;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(56, 189, 248, 0.06) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .hero {
        text-align: center;
        position: relative;
        z-index: 1;
      }
      .hero-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--ink3);
        border: 1.5px solid var(--line);
        border-radius: 100px;
        color: var(--lime);
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 5px 14px;
        margin-bottom: 1rem;
      }
      .hero-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--lime);
        animation: blink 1.6s ease infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      .hero-title {
        font-family: var(--disp);
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.02em;
      }
      .hero-title span {
        color: var(--lime);
      }
      .hero-sub {
        margin-top: 0.75rem;
        color: var(--text2);
        font-size: 14px;
      }

      .lcard {
        background: var(--ink2);
        border: 1.5px solid var(--line);
        border-radius: var(--r-xl);
        padding: 1.5rem;
        width: 100%;
        max-width: 400px;
        position: relative;
        z-index: 1;
      }
      .tabs {
        display: flex;
        background: var(--ink3);
        border-radius: var(--r-md);
        padding: 4px;
        gap: 4px;
        margin-bottom: 1.25rem;
      }
      .tab-btn {
        flex: 1;
        background: transparent;
        border: none;
        border-radius: var(--r-sm);
        color: var(--text3);
        cursor: pointer;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 600;
        padding: 8px 10px;
        min-height: 40px;
        transition: all 0.18s;
      }
      .tab-btn.active {
        background: var(--lime);
        color: var(--ink);
      }
      .tab-btn:not(.active):hover {
        color: var(--text2);
      }
      .tab-pane {
        display: none;
        flex-direction: column;
        gap: 10px;
      }
      .tab-pane.active {
        display: flex;
      }
      .lerr {
        color: var(--coral);
        font-size: 12.5px;
        min-height: 18px;
        text-align: center;
        margin-top: 2px;
      }

      /* ══ GAME ROOM ════════════════════════════════════════════════════════ */
      #game {
        display: none;
        flex-direction: column;
        height: 100dvh;
      }
      #game.active {
        display: flex;
      }

      .gh {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--ink2);
        border-bottom: 1.5px solid var(--line);
        flex-shrink: 0;
        gap: 0.75rem;
        padding: 0 16px;
        height: 52px;
      }
      .gh-left {
        display: flex;
        align-items: center;
        gap: 10px;
        overflow: hidden;
      }
      .gh-logo {
        font-family: var(--disp);
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--lime);
        letter-spacing: -0.01em;
        flex-shrink: 0;
      }

      .gh-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--ink3);
        border: 1.5px solid var(--line);
        border-radius: 100px;
        padding: 4px 10px 4px 8px;
        cursor: pointer;
        transition: border-color 0.18s;
        flex-shrink: 0;
      }
      .gh-pill:hover {
        border-color: var(--sky);
      }
      .gh-pill-label {
        color: var(--text3);
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .gh-pill-code {
        color: var(--sky);
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.06em;
      }
      .gh-pill-icon {
        color: var(--text3);
        font-size: 11px;
      }

      .gh-share {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--ink3);
        border: 1.5px solid var(--line);
        border-radius: 100px;
        padding: 4px 10px;
        cursor: pointer;
        transition: border-color 0.18s;
        color: var(--text2);
        font-size: 12px;
        font-family: var(--mono);
        flex-shrink: 0;
        min-height: 30px;
      }
      .gh-share:hover {
        border-color: var(--violet);
        color: var(--violet);
      }

      .gh-pcount {
        color: var(--text2);
        font-size: 12px;
        flex-shrink: 0;
      }
      .gh-pcount b {
        color: var(--lime);
      }

      .gh-round {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--ink3);
        border: 1.5px solid var(--line);
        border-radius: 100px;
        padding: 4px 12px;
        font-size: 11px;
        color: var(--text3);
        font-family: var(--mono);
        flex-shrink: 0;
      }
      .gh-round b {
        color: var(--amber);
      }

      .gh-timer {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      .timer-ring {
        position: relative;
        width: 36px;
        height: 36px;
        flex-shrink: 0;
      }
      .timer-ring svg {
        transform: rotate(-90deg);
      }
      .timer-track {
        fill: none;
        stroke: var(--ink4);
        stroke-width: 3;
      }
      .timer-arc {
        fill: none;
        stroke: var(--lime);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 95;
        stroke-dashoffset: 0;
        transition:
          stroke-dashoffset 1s linear,
          stroke 0.3s;
      }
      .timer-arc.danger {
        stroke: var(--coral);
      }
      .timer-num {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
      }
      .timer-num.danger {
        color: var(--coral);
      }

      .gb {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .gsb {
        display: flex;
        flex-direction: column;
        width: 180px;
        flex-shrink: 0;
        background: var(--ink2);
        border-right: 1.5px solid var(--line);
        overflow: hidden;
      }
      .gsb-head {
        padding: 10px 12px 8px;
        border-bottom: 1.5px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .gsb-title {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text3);
      }
      .gsb-badge {
        background: var(--ink3);
        border: 1px solid var(--line);
        border-radius: 100px;
        color: var(--text3);
        font-family: var(--mono);
        font-size: 10px;
        padding: 2px 7px;
      }
      .gpl {
        flex: 1;
        overflow-y: auto;
        padding: 6px;
      }
      .gpi {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-radius: var(--r-md);
        padding: 7px 8px;
        transition: background 0.14s;
        cursor: default;
        position: relative;
      }
      .gpi:hover {
        background: var(--ink3);
      }
      .gpi.me {
        background: rgba(200, 241, 53, 0.05);
        border: 1px solid rgba(200, 241, 53, 0.12);
      }
      .gpi-l {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .gpi-av {
        width: 28px;
        height: 28px;
        border-radius: var(--r-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        flex-shrink: 0;
        font-family: var(--disp);
      }
      .gpi-info {
        min-width: 0;
      }
      .gpi-name {
        font-size: 12px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .tag-you {
        background: rgba(200, 241, 53, 0.15);
        border: 1px solid rgba(200, 241, 53, 0.3);
        border-radius: 4px;
        color: var(--lime);
        font-size: 9px;
        font-weight: 700;
        padding: 1px 4px;
      }
      .tag-gm {
        color: var(--amber);
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 0.06em;
        margin-top: 1px;
      }
      .tag-ready {
        color: var(--green);
        font-family: var(--mono);
        font-size: 9px;
        margin-top: 1px;
      }
      .tag-fire {
        font-size: 11px;
        margin-left: 2px;
        animation: fire-pulse 0.8s ease infinite alternate;
      }
      @keyframes fire-pulse {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.3);
        }
      }
      .gpi-score {
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        flex-shrink: 0;
      }
      .gpi-rank {
        position: absolute;
        left: -2px;
        top: 50%;
        transform: translateY(-50%);
        width: 3px;
        height: 18px;
        border-radius: 0 3px 3px 0;
      }

      .gchat {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      .gmsg-feed {
        flex: 1;
        overflow-y: auto;
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .msg {
        display: flex;
        flex-direction: column;
        max-width: 78%;
        animation: slide-up 0.16s ease;
      }
      @keyframes slide-up {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg.out {
        align-self: flex-end;
      }
      .msg.inc {
        align-self: flex-start;
      }
      .msg.sys,
      .msg.announce {
        align-self: center;
        max-width: 100%;
        width: 100%;
      }
      .msg-name {
        font-size: 11px;
        font-weight: 500;
        margin-bottom: 2px;
        padding: 0 3px;
      }
      .msg.out .msg-name {
        text-align: right;
      }
      .msg-bub {
        border-radius: var(--r-lg);
        font-size: 13px;
        line-height: 1.5;
        padding: 8px 12px;
        word-break: break-word;
      }
      .msg.out .msg-bub {
        background: var(--ink3);
        border: 1.5px solid var(--line);
        border-bottom-right-radius: 4px;
      }
      .msg.inc .msg-bub {
        background: var(--ink2);
        border: 1.5px solid var(--line);
        border-bottom-left-radius: 4px;
      }
      .msg.sys .msg-bub {
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 100px;
        color: var(--text3);
        font-family: var(--mono);
        font-size: 11px;
        text-align: center;
        padding: 3px 16px;
      }
      .msg.correct .msg-bub {
        background: rgba(200, 241, 53, 0.08);
        border-color: rgba(200, 241, 53, 0.28);
        color: var(--lime);
      }
      .msg.wrong .msg-bub {
        background: rgba(255, 94, 91, 0.05);
        border-color: rgba(255, 94, 91, 0.15);
      }
      .ann-card {
        border-radius: var(--r-lg);
        padding: 14px 18px;
        text-align: center;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.6;
      }
      .ann-win {
        background: rgba(200, 241, 53, 0.08);
        border: 1.5px solid rgba(200, 241, 53, 0.35);
        color: var(--lime);
      }
      .ann-timeout {
        background: rgba(255, 94, 91, 0.07);
        border: 1.5px solid rgba(255, 94, 91, 0.3);
        color: var(--coral);
      }
      .ann-round {
        background: rgba(56, 189, 248, 0.06);
        border: 1.5px solid rgba(56, 189, 248, 0.22);
        color: var(--sky);
        font-size: 13px;
      }

      .gctrl {
        background: var(--ink2);
        border-top: 1.5px solid var(--line);
        padding: 10px 14px;
        flex-shrink: 0;
      }
      .qstrip {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        background: var(--ink3);
        border: 1.5px solid var(--line2);
        border-radius: var(--r-md);
        padding: 8px 12px;
        margin-bottom: 8px;
      }
      .qstrip-icon {
        color: var(--sky);
        font-size: 14px;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .qstrip-label {
        color: var(--sky);
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .qstrip-text {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }
      .ctrl-status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text2);
        font-size: 13px;
        padding: 3px 0;
      }
      .pulse {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
        animation: pulse-anim 1.5s ease infinite;
      }
      .pulse.lime {
        background: var(--lime);
      }
      .pulse.blue {
        background: var(--sky);
      }
      .pulse.green {
        background: var(--green);
      }
      @keyframes pulse-anim {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.25;
          transform: scale(0.55);
        }
      }
      .qform {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .qform-row {
        display: flex;
        gap: 7px;
      }
      .qform-row input {
        flex: 1;
      }
      .qpreview {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        background: rgba(200, 241, 53, 0.06);
        border: 1.5px solid rgba(200, 241, 53, 0.22);
        border-radius: var(--r-md);
        padding: 9px 12px;
        margin-bottom: 8px;
      }
      .qpreview-icon {
        color: var(--lime);
        font-size: 15px;
        flex-shrink: 0;
      }
      .qpreview-text {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }

      .ready-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--ink3);
        border: 1.5px solid var(--line);
        border-radius: var(--r-md);
        padding: 8px 12px;
        margin-bottom: 8px;
      }
      .ready-bar-count {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text3);
        flex: 1;
      }
      .ready-bar-count b {
        color: var(--green);
      }
      .ready-bar-count.all-ready b {
        color: var(--lime);
      }

      .start-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .start-hint {
        color: var(--text3);
        font-size: 12px;
        flex: 1;
      }
      .guess-row {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .guess-row input {
        flex: 1;
      }
      .attempts-badge {
        display: flex;
        align-items: center;
        gap: 4px;
        background: var(--ink3);
        border: 1.5px solid var(--line);
        border-radius: var(--r-sm);
        padding: 5px 9px;
        flex-shrink: 0;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text3);
        white-space: nowrap;
      }
      .attempts-badge b {

      /* ══ GAME OVER SCREEN ════════════════════════════════════════════════ */

  <body>
    <!-- ══ LANDING ═══════════════════════════════════════════════════════ -->
    <div id="landing">
      <div class="blob2"></div>
      <div class="hero">
        <div class="hero-eyebrow">
          <div class="hero-dot"></div>
          Live Multiplayer
        </div>
        <h1 class="hero-title">Guess<span>Wave</span></h1>
        <p class="hero-sub">Outsmart your friends in real time</p>
      </div>
      <div class="lcard">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('create')">
            Host a game
          </button>
          <button class="tab-btn" onclick="switchTab('join')">
            Join a game
          </button>
        </div>
        <div class="tab-pane active" id="tab-create">
          <input
            id="create-name"
            type="text"
            placeholder="Your display name"
            maxlength="20"
            autocomplete="off"
          />
          <button
            class="btn btn-lime"
            id="btn-create"
            onclick="createSession()"
          >
            Let's Go
          </button>
        </div>
        <div class="tab-pane" id="tab-join">
          <input
            id="join-name"
            type="text"
            placeholder="Your display name"
            maxlength="20"
            autocomplete="off"
          />
          <input
            id="join-code"
            type="text"
            placeholder="Session code (e.g. A3F9Z1)"
            maxlength="10"
            autocomplete="off"
            style="
              font-family: var(--mono);
              letter-spacing: 0.06em;
              text-transform: uppercase;
            "
          />
          <button class="btn btn-lime" id="btn-join" onclick="joinSession()">
            Join Now
          </button>
        </div>
        <div class="lerr" id="landing-err"></div>
      </div>
    </div>

    <!-- ══ GAME ROOM ══════════════════════════════════════════════════════ -->
    <div id="game">
      <header class="gh">
        <div class="gh-left">
          <span class="gh-logo">GuessWave</span>
          <div class="gh-pill" onclick="copyCode()" title="Copy session code">
            <span class="gh-pill-label">Code</span>
            <span class="gh-pill-code" id="session-code-disp">------</span>
            <span class="gh-pill-icon">⎘</span>
          </div>
          <button
            class="gh-share"
            onclick="shareLink()"
            title="Copy invite link"
          >
            🔗 <span class="gh-share-label">Invite</span>
          </button>
          <span class="gh-pcount"><b id="pcount-num">0</b> players</span>
        </div>
        <div class="gh-round hidden" id="round-display">
          Round <b id="round-cur">1</b> of <b id="round-tot">1</b>
        </div>
        <div class="gh-timer hidden" id="timer-wrap">
          <div class="timer-ring">
            <svg viewBox="0 0 36 36" width="36" height="36">
              <circle class="timer-track" cx="18" cy="18" r="15" />
              <circle class="timer-arc" cx="18" cy="18" r="15" id="timer-arc" />
            </svg>
            <div class="timer-num" id="timer-num">60</div>
          </div>
        </div>
      </header>

      <div class="gb">
        <aside class="gsb">
          <div class="gsb-head">
            <span class="gsb-title">Scores</span>
            <span class="gsb-badge" id="status-badge">Lobby</span>
          </div>
          <div class="gpl" id="player-list"></div>
        </aside>
        <div class="gchat">
          <div id="reaction-layer"></div>
          <div class="gmsg-feed" id="messages"></div>
          <div class="gctrl">
            <div id="controls-inner"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ GAME OVER ══════════════════════════════════════════════════════ -->
    <div id="gameover">
      <div class="go-title">Game<span>Over</span> 🎉</div>
      <div class="go-champion">
        <div class="go-champ-label">Champion</div>
        <span class="go-champ-crown">👑</span>
        <div class="go-champ-name" id="go-champ-name">—</div>
        <div class="go-champ-score" id="go-champ-score"></div>
      </div>
      <div class="go-lb" id="go-lb"></div>
      <div class="go-actions">
        <div class="go-new-gm-hint" id="go-gm-hint"></div>
        <button class="btn btn-lime go-play-again" onclick="playAgain()">
          🔄 Play Again
        </button>
        <button class="go-leave" onclick="leaveGame()">Leave session</button>
      </div>
    </div>

    <canvas id="confetti-canvas"></canvas>
    <div id="toast"></div>

    <script>
      /* ── Colors ─────────────────────────────────────────────────────── */
      const AV = [
        { bg: "rgba(200,241,53,.15)", fg: "#c8f135" },
        { bg: "rgba(255,94,91,.15)", fg: "#ff5e5b" },
        { bg: "rgba(56,189,248,.15)", fg: "#38bdf8" },
        { bg: "rgba(251,191,36,.15)", fg: "#fbbf24" },
        { bg: "rgba(167,139,250,.15)", fg: "#a78bfa" },
        { bg: "rgba(52,211,153,.15)", fg: "#34d399" },
      ];

      /* ── State ──────────────────────────────────────────────────────── */
      const S = {
        playerId: null,
        playerName: null,
        sessionId: null,
        isGM: false,
        gameMasterId: null,
        gameStatus: "waiting",
        questionSet: false,
        question: null,
        players: [],
        attemptsLeft: 3,
        canGuess: true,
        timerInterval: null,
        colorMap: {},
        roundNumber: 1,
        totalRounds: 1,
        streakMap: {},
        myReady: false,
        readyCount: 0,
        nonGMCount: 0,
        firstGameStarted: false,
      };

      /* ── Utils ──────────────────────────────────────────────────────── */
      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      function pColor(pid) {
        if (S.colorMap[pid] === undefined)
          S.colorMap[pid] = Object.keys(S.colorMap).length % AV.length;
        return AV[S.colorMap[pid]];
      }
      function gmName() {
        const g = S.players.find((p) => p.id === S.gameMasterId);
        return g ? g.name : "Game Master";
      }

      /* ── Audio ──────────────────────────────────────────────────────── */
      const AC = new (window.AudioContext || window.webkitAudioContext)();
      function playTone(freq, type = "sine", dur = 0.18, vol = 0.18) {
        try {
          const o = AC.createOscillator(),
            g = AC.createGain();
          o.connect(g);
          g.connect(AC.destination);
          o.type = type;
          o.frequency.value = freq;
          g.gain.setValueAtTime(vol, AC.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
          o.start();
          o.stop(AC.currentTime + dur);
        } catch (e) {}
      }
      function soundCorrect() {
        playTone(880, "sine", 0.15, 0.2);
        setTimeout(() => playTone(1100, "sine", 0.2, 0.18), 120);
      }
      function soundWrong() {
        playTone(220, "sawtooth", 0.2, 0.15);
      }
      function soundWin() {
        [523, 659, 784, 1047].forEach((f, i) =>
          setTimeout(() => playTone(f, "sine", 0.25, 0.2), i * 100),
        );
      }
      function soundTick() {
        playTone(440, "sine", 0.06, 0.08);
      }

      /* ── Confetti ───────────────────────────────────────────────────── */
      const canvas = $("confetti-canvas");
      const ctx = canvas.getContext("2d");
      let confettiPieces = [],
        confettiRunning = false;
      const CONF_COLORS = [
        "#c8f135",
        "#ff5e5b",
        "#38bdf8",
        "#fbbf24",
        "#a78bfa",
        "#34d399",
      ];
      function launchConfetti() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        confettiPieces = Array.from({ length: 120 }, () => ({
          x: Math.random() * canvas.width,
          y: -10,
          w: 6 + Math.random() * 8,
          h: 10 + Math.random() * 14,
          color: CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)],
          rot: Math.random() * 360,
          rotV: (Math.random() - 0.5) * 6,
          vx: (Math.random() - 0.5) * 3,
          vy: 2 + Math.random() * 4,
          alpha: 1,
        }));
        if (!confettiRunning) {
          confettiRunning = true;
          animConfetti();
        }
      }
      function animConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        confettiPieces = confettiPieces.filter((p) => p.alpha > 0.05);
        confettiPieces.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.rotV;
          if (p.y > canvas.height * 0.7) p.alpha -= 0.02;
          ctx.save();
          ctx.globalAlpha = p.alpha;
          ctx.translate(p.x, p.y);
          ctx.rotate((p.rot * Math.PI) / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        });
        if (confettiPieces.length > 0) requestAnimationFrame(animConfetti);
        else {
          confettiRunning = false;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      /* ── Floating Reactions ─────────────────────────────────────────── */
      function showFloatReaction(emoji, fromName) {
        const layer = $("reaction-layer");
        const el = document.createElement("div");
        el.className = "float-reaction";
        el.textContent = emoji;
        el.style.left = 15 + Math.random() * 60 + "%";
        el.title = fromName;
        layer.appendChild(el);
        setTimeout(() => el.remove(), 2600);
      }

      /* ── Socket ─────────────────────────────────────────────────────── */
      const socket = io({
        reconnection: true,
        reconnectionAttempts: Infinity,
        reconnectionDelay: 1000,
        reconnectionDelayMax: 5000,
        randomizationFactor: 0.3,
        timeout: 10000,
        transports: ["websocket", "polling"],
      });

      /* ── Read session code from shareable URL ───────────────────────── */
      (function checkJoinUrl() {
        const m = window.location.pathname.match(/^\/join\/([A-Z0-9]+)$/i);
        if (!m) return;
        const code = m[1].toUpperCase();
        switchTab("join");
        const codeInput = $("join-code");
        if (codeInput) codeInput.value = code;
        history.replaceState(null, "", "/");
      })();

      /* ── Landing ────────────────────────────────────────────────────── */
      function switchTab(tab) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b, i) =>
            b.classList.toggle("active", (i === 0) === (tab === "create")),
          );
        $("tab-create").classList.toggle("active", tab === "create");
        $("tab-join").classList.toggle("active", tab === "join");
        $("landing-err").textContent = "";
      }
      function setErr(msg) {
        $("landing-err").textContent = msg;
      }
      function setLoading(on) {
        $("btn-create").disabled = on;
        $("btn-join").disabled = on;
      }

      function createSession() {
        const name = $("create-name").value.trim();
        if (!name) return setErr("Enter your display name.");
        setLoading(true);
        socket.emit("create-session", { playerName: name }, (res) => {
          setLoading(false);
          if (res.error) return setErr(res.error);
          enterGame(res, name);
          addMsg(
            "sys",
            "🎮 Session created! Share the invite link, then set a question.",
          );
        });
      }

      function joinSession() {
        const name = $("join-name").value.trim();
        const code = $("join-code").value.trim().toUpperCase();
        if (!name) return setErr("Enter your display name.");
        if (!code) return setErr("Enter a session code.");
        setLoading(true);
        socket.emit(
          "join-session",
          { playerName: name, sessionId: code },
          (res) => {
            setLoading(false);
            if (res.error) return setErr(res.error);
            S.readyCount = res.readyCount || 0;
            S.nonGMCount = res.nonGMCount || 0;
            S.firstGameStarted = res.firstGameStarted || false;
            enterGame(res, name);
            addMsg(
              "sys",
              `Joined! ${res.firstGameStarted ? "Waiting for the GM." : "Click Ready when you're set."}`,
            );
            if (res.question) addMsg("sys", "❓ Question is set!");
          },
        );
      }

      $("create-name").addEventListener("keydown", (e) => {
        if (e.key === "Enter") createSession();
      });
      $("join-name").addEventListener("keydown", (e) => {
        if (e.key === "Enter") $("join-code").focus();
      });
      $("join-code").addEventListener("keydown", (e) => {
        if (e.key === "Enter") joinSession();
      });
      $("join-code").addEventListener("input", (e) => {
        const sel = e.target.selectionStart;
        e.target.value = e.target.value.toUpperCase();
        e.target.setSelectionRange(sel, sel);
      });

      /* ── Enter Game ─────────────────────────────────────────────────── */
      function enterGame(data, name) {
        S.playerId = data.playerId;
        S.playerName = name;
        S.sessionId = data.sessionId;
        S.isGM = data.isGameMaster;
        S.gameMasterId = data.gameMasterId;
        S.players = data.players;
        S.questionSet = !!data.question;
        S.question = data.question || null;
        S.gameStatus = "waiting";
        S.roundNumber = data.roundNumber || 1;
        S.totalRounds = data.totalRounds || 1;
        S.myReady = false;
        S.readyCount = data.readyCount || 0;
        S.nonGMCount = data.nonGMCount || 0;
        S.firstGameStarted = data.firstGameStarted || false;
        data.players.forEach((p, i) => {
          S.colorMap[p.id] = i % AV.length;
        });
        $("session-code-disp").textContent = data.sessionId;
        $("landing").style.display = "none";
        $("game").classList.add("active");
        updateRoundDisplay();
        renderPlayers();
        renderControls();

        /* FIX 1: Save session token inside enterGame where data & name are in scope */
        localStorage.setItem("gw_token", data.playerId);
        localStorage.setItem("gw_session", data.sessionId);
        localStorage.setItem("gw_name", name);
      }

      /* ── Round display ──────────────────────────────────────────────── */
      function updateRoundDisplay() {
        const rd = $("round-display");
        if (S.gameStatus === "in-progress" || S.gameStatus === "ended") {
          rd.classList.remove("hidden");
          $("round-cur").textContent = S.roundNumber;
          $("round-tot").textContent = S.totalRounds;
        } else {
          rd.classList.add("hidden");
        }
      }

      /* ── Render Sidebar ─────────────────────────────────────────────── */
      function renderPlayers() {
        const sorted = [...S.players].sort((a, b) => b.score - a.score);
        const RANK_COLORS = ["#fbbf24", "#9997bb", "#cd7c3a"];

        $("player-list").innerHTML = sorted
          .map((p, idx) => {
            const c = pColor(p.id);
            const isMe = p.id === S.playerId;
            const isGM = p.id === S.gameMasterId;
            const streak = S.streakMap[p.id] || 0;
            const onFire = streak >= 2;
            const scoreColor = p.score > 0 ? "var(--lime)" : "var(--text3)";
            const rankColor = idx < 3 ? RANK_COLORS[idx] : "transparent";
            const showReady =
              S.gameStatus === "waiting" &&
              !S.firstGameStarted &&
              !isGM &&
              p.ready;
            return `
      <div class="gpi${isMe ? " me" : ""}">
        <div class="gpi-rank" style="background:${rankColor}"></div>
        <div class="gpi-l">
          <div class="gpi-av" style="background:${c.bg};color:${c.fg}">${esc(p.name[0].toUpperCase())}</div>
          <div class="gpi-info">
            <div class="gpi-name">
              ${esc(p.name)}
              ${isMe ? '<span class="tag-you">you</span>' : ""}
              ${onFire ? `<span class="tag-fire" title="${streak} wins in a row!">🔥</span>` : ""}
            </div>
            ${isGM ? '<div class="tag-gm">★ MASTER</div>' : ""}
            ${showReady ? '<div class="tag-ready">✓ ready</div>' : ""}
          </div>
        </div>
        <div class="gpi-score" style="color:${scoreColor}">${p.score}pt</div>
      </div>`;
          })
          .join("");

        $("pcount-num").textContent = S.players.length;

        const badge = $("status-badge");
        const states = {
          waiting: ["Lobby", "var(--text3)", ""],
          "in-progress": ["Live", "var(--lime)", "rgba(200,241,53,.2)"],
          "round-over": ["Round ✓", "var(--amber)", ""],
          "game-over": ["Done", "var(--coral)", ""],
        };
        const [label, color, bg] = states[S.gameStatus] || states["waiting"];
        badge.textContent = label;
        badge.style.color = color;
        badge.style.background = bg;
      }

      /* ── Render Controls ────────────────────────────────────────────── */
      function renderControls() {
        const el = $("controls-inner");
        const REACTIONS = ["👀", "🔥", "💀", "😂", "🤯", "👏"];
        const reactionBar = `
    <div class="reactions-bar">
      ${REACTIONS.map((e) => `<button class="react-btn" onclick="sendReaction('${e}')" title="React">${e}</button>`).join("")}
    </div>`;

        if (S.gameStatus === "waiting") {
          if (S.isGM) {
            const ngc = S.nonGMCount;
            const rc = S.readyCount;
            const ar = ngc > 0 && rc === ngc;
            const enoughPlayers = S.players.length >= 3;

            const canStart = S.firstGameStarted
              ? enoughPlayers && S.questionSet
              : enoughPlayers && ar && S.questionSet;

            let startHint = "";
            if (!enoughPlayers) {
              const need = 3 - S.players.length;
              startHint = `Need <b>${need}</b> more player${need !== 1 ? "s" : ""}`;
            } else if (!S.questionSet) {
              startHint = "Set a question first";
            } else if (!S.firstGameStarted && !ar) {
              startHint = `<span style="color:var(--green)">${rc}/${ngc}</span> players ready`;
            } else {
              startHint =
                '<span style="color:var(--lime)">Ready to start!</span>';
            }

            if (!S.questionSet) {
              el.innerHTML = `
          <div class="qform">
            <input id="q-input" type="text" placeholder="Type your question…" maxlength="200" autocomplete="off" />
            <div class="qform-row">
              <input id="a-input" type="text" placeholder="Answer (hidden from players)" maxlength="100" autocomplete="off" />
              <button class="btn btn-lime" onclick="setQuestion()">Set →</button>
            </div>
          </div>`;
              $("q-input").addEventListener("keydown", (e) => {
                if (e.key === "Enter") $("a-input").focus();
              });
              $("a-input").addEventListener("keydown", (e) => {
                if (e.key === "Enter") setQuestion();
              });
            } else {
              const readyBarHtml = !S.firstGameStarted
                ? `
          <div class="ready-bar">
            <span class="ready-bar-count${ar ? " all-ready" : ""}">
              <b>${rc}/${ngc}</b> players ready
            </span>
          </div>`
                : "";

              el.innerHTML = `
          <div class="qpreview">
            <span class="qpreview-icon">❓</span>
            <span class="qpreview-text">${esc(S.question)}</span>
          </div>
          ${readyBarHtml}
          <div class="start-row">
            <span class="start-hint">${startHint}</span>
            <button class="btn btn-ghost" onclick="changeQuestion()" style="padding:9px 14px;font-size:13px">Change</button>
            <button class="btn btn-lime"  onclick="startGame()" ${canStart ? "" : "disabled"}>▶ Start</button>
          </div>`;
            }
          } else {
            if (S.firstGameStarted) {
              const waitMsg = S.questionSet
                ? `Waiting for <b style="color:var(--text)">${esc(gmName())}</b> to start…`
                : `Waiting for <b style="color:var(--text)">${esc(gmName())}</b> to set a question…`;
              el.innerHTML = `
          <div class="ctrl-status">
            <div class="pulse lime"></div>
            ${waitMsg}
          </div>`;
            } else {
              const readyClass = S.myReady ? "is-ready" : "";
              const readyLabel = S.myReady ? "✓ Ready!" : "Click to Ready Up";
              const waitMsg = S.questionSet
                ? `Waiting for <b style="color:var(--text)">${esc(gmName())}</b> to start…`
                : `Waiting for <b style="color:var(--text)">${esc(gmName())}</b> to set a question…`;
              el.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <button class="btn btn-ready ${readyClass}" onclick="toggleReady()" style="flex:1">
              ${readyLabel}
            </button>
            <span style="color:var(--text3);font-family:var(--mono);font-size:12px;white-space:nowrap">
              ${S.readyCount}/${S.nonGMCount} ready
            </span>
          </div>
          <div class="ctrl-status">
            <div class="pulse lime"></div>
            ${waitMsg}
          </div>`;
            }
          }
        } else if (S.gameStatus === "in-progress") {
          const qStrip = `
      <div class="qstrip">
        <div class="qstrip-icon">❓</div>
        <div>
          <div class="qstrip-label">Question</div>
          <div class="qstrip-text">${esc(S.question)}</div>
        </div>
      </div>`;

          if (S.isGM) {
            el.innerHTML = `${reactionBar}${qStrip}<div class="gm-watch">👁 You set the question — watch the guesses!</div>`;
          } else if (S.canGuess) {
            el.innerHTML = `
        ${reactionBar}
        ${qStrip}
        <div class="guess-row">
          <div class="attempts-badge">× <b>${S.attemptsLeft}</b></div>
          <input id="guess-input" type="text" placeholder="Type your answer…" maxlength="200" autocomplete="off" />
          <button class="btn-icon" id="guess-btn" onclick="submitGuess()" title="Submit">➤</button>
        </div>`;
            $("guess-input").focus();
            $("guess-input").addEventListener("keydown", (e) => {
              if (e.key === "Enter") submitGuess();
            });
          } else {
            el.innerHTML = `${reactionBar}${qStrip}<div class="no-attempts">💀 No attempts left — cheering from the sidelines!</div>`;
          }
        } else {
          el.innerHTML = `
      <div class="ctrl-status">
        <div class="pulse blue"></div>
        Round over — next round starting soon…
      </div>`;
        }
      }

      /* ── Actions ────────────────────────────────────────────────────── */
      function setQuestion() {
        const q = ($("q-input") || {}).value?.trim();
        const a = ($("a-input") || {}).value?.trim();
        if (!q) return showToast("Please enter a question.");
        if (!a) return showToast("Please enter the answer.");
        socket.emit("set-question", { question: q, answer: a }, (res) => {
          if (res.error) return showToast(res.error);
        });
      }

      function changeQuestion() {
        S.questionSet = false;
        S.question = null;
        renderControls();
      }

      function startGame() {
        socket.emit("start-game", (res) => {
          if (res.error) return showToast(res.error);
        });
      }

      function toggleReady() {
        socket.emit("player-ready", (res) => {
          if (res && res.error) return showToast(res.error);
          S.myReady = res.ready;
          renderControls();
        });
      }

      function submitGuess() {
        const input = $("guess-input");
        if (!input) return;
        const guess = input.value.trim();
        if (!guess) return;
        input.value = "";
        input.disabled = true;
        if ($("guess-btn")) $("guess-btn").disabled = true;
        socket.emit("submit-guess", { guess }, (res) => {
          if (res.error) {
            showToast(res.error);
            if (input) {
              input.disabled = false;
              if ($("guess-btn")) $("guess-btn").disabled = false;
            }
            return;
          }
          if (!res.correct) {
            S.attemptsLeft = res.attemptsLeft;
            if (res.attemptsLeft === 0) {
              S.canGuess = false;
              renderControls();
            } else {
              if (input) {
                input.disabled = false;
                if ($("guess-btn")) $("guess-btn").disabled = false;
                input.focus();
              }
              const b = document.querySelector(".attempts-badge b");
              if (b) b.textContent = res.attemptsLeft;
            }
          }
        });
      }

      function sendReaction(emoji) {
        socket.emit("send-reaction", { emoji });
        showFloatReaction(emoji, "You");
      }

      /* ── Play Again ─────────────────────────────────────────────────── */
      function playAgain() {
        socket.emit("play-again", (res) => {
          if (res && res.error) return showToast(res.error);
        });
      }

      /* ── Leave ──────────────────────────────────────────────────────── */
      function leaveGame() {
        localStorage.removeItem("gw_token");
        localStorage.removeItem("gw_session");
        localStorage.removeItem("gw_name");
        socket.disconnect();
        location.reload();
      }

      /* ── Timer ──────────────────────────────────────────────────────── */
      function startTimer(duration) {
        clearInterval(S.timerInterval);
        let left = duration;
        const CIRC = 94;
        const arcEl = $("timer-arc"),
          numEl = $("timer-num"),
          wrap = $("timer-wrap");
        wrap.classList.remove("hidden");
        function tick() {
          numEl.textContent = left;
          arcEl.style.strokeDasharray = `${CIRC}`;
          arcEl.style.strokeDashoffset = CIRC - (left / duration) * CIRC;
          const d = left <= 10;
          arcEl.classList.toggle("danger", d);
          numEl.classList.toggle("danger", d);
          if (d && left > 0) soundTick();
          if (left <= 0) {
            clearInterval(S.timerInterval);
            return;
          }
          left--;
        }
        tick();
        S.timerInterval = setInterval(tick, 1000);
      }
      function stopTimer() {
        clearInterval(S.timerInterval);
        $("timer-wrap").classList.add("hidden");
      }

      /* ── Messages ───────────────────────────────────────────────────── */
      function addMsg(type, content, opts = {}) {
        const feed = $("messages");
        const el = document.createElement("div");
        el.className = `msg ${type}`;
        if (type === "sys") {
          el.innerHTML = `<div class="msg-bub">${esc(content)}</div>`;
        } else if (["win-ann", "timeout-ann", "round-ann"].includes(type)) {
          const cls =
            type === "win-ann"
              ? "ann-win"
              : type === "timeout-ann"
                ? "ann-timeout"
                : "ann-round";
          el.classList.add("announce");
          el.innerHTML = `<div class="ann-card ${cls}">${content}</div>`;
        } else {
          const isMe = opts.playerId === S.playerId;
          el.classList.add(isMe ? "out" : "inc");
          if (opts.correct === true) el.classList.add("correct");
          else if (opts.correct === false && opts.showResult)
            el.classList.add("wrong");
          let name = "";
          if (!isMe) {
            const c = pColor(opts.playerId);
            name = `<div class="msg-name" style="color:${c.fg}">${esc(opts.playerName)}</div>`;
          }
          const check =
            opts.correct === true
              ? " ✓"
              : opts.correct === false && opts.showResult
                ? " ✗"
                : "";
          el.innerHTML = `${name}<div class="msg-bub">${esc(content)}${check}</div>`;
        }
        feed.appendChild(el);
        feed.scrollTop = feed.scrollHeight;
      }

      /* ── Game Over Screen ───────────────────────────────────────────── */
      function showGameOver(champion, scores) {
        if (champion) {
          $("go-champ-name").textContent = champion.name;
          $("go-champ-score").textContent = `${champion.score} points`;
        } else {
          $("go-champ-name").textContent = "No winner";
          $("go-champ-score").textContent = "";
        }
        const medals = ["🥇", "🥈", "🥉"];
        $("go-lb").innerHTML = scores
          .map(
            (s, i) => `
    <div class="go-lb-row">
      <span class="go-lb-pos">${medals[i] || `${i + 1}.`}</span>
      <span class="go-lb-name">${esc(s.name)}${s.id === S.playerId ? ' <span style="color:var(--lime);font-size:11px">(you)</span>' : ""}</span>
      <span class="go-lb-score">${s.score}pt</span>
    </div>`,
          )
          .join("");

        $("go-gm-hint").innerHTML = `Next GM will be the original host`;
        $("gameover").classList.add("active");
        $("game").style.display = "none";
        soundWin();
        launchConfetti();
      }

      /* ── Socket Events ──────────────────────────────────────────────── */
      socket.on(
        "player-joined",
        ({ player, players, totalRounds, readyCount, nonGMCount }) => {
          pColor(player.id);
          S.players = players;
          S.totalRounds = totalRounds || S.totalRounds;
          S.readyCount = readyCount || 0;
          S.nonGMCount = nonGMCount || 0;
          renderPlayers();
          renderControls();
          addMsg("sys", `${player.name} joined the session`);
        },
      );

      socket.on(
        "player-left",
        ({ playerId, playerName, players, readyCount, nonGMCount }) => {
          S.players = players;
          S.readyCount = readyCount || 0;
          S.nonGMCount = nonGMCount || 0;
          renderPlayers();
          renderControls();
          addMsg("sys", `${playerName} left the session`);
        },
      );

      socket.on(
        "ready-update",
        ({
          playerId,
          playerName,
          ready,
          readyCount,
          nonGMCount,
          allReady,
          players,
        }) => {
          S.players = players;
          S.readyCount = readyCount;
          S.nonGMCount = nonGMCount;
          if (playerId === S.playerId) S.myReady = ready;
          renderPlayers();
          renderControls();
          addMsg(
            "sys",
            ready ? `${playerName} is ready ✓` : `${playerName} is not ready`,
          );
        },
      );

      socket.on("question-set", ({ question, gameMasterName }) => {
        S.question = question;
        S.questionSet = true;
        renderControls();
        const hint = S.firstGameStarted ? "" : " — ready up to start!";
        addMsg("sys", `❓ ${gameMasterName} set a question${hint}`);
      });

      socket.on(
        "game-started",
        ({ question, duration, players, roundNumber, totalRounds }) => {
          S.gameStatus = "in-progress";
          S.question = question;
          S.players = players;
          S.attemptsLeft = 3;
          S.canGuess = !S.isGM;
          S.roundNumber = roundNumber || S.roundNumber;
          S.totalRounds = totalRounds || S.totalRounds;
          S.firstGameStarted = true;
          renderPlayers();
          renderControls();
          updateRoundDisplay();
          startTimer(duration);
          addMsg(
            "sys",
            S.isGM
              ? "🚀 Game started! Watch the guesses."
              : "🚀 Round started! 3 attempts — go!",
          );
        },
      );

      socket.on(
        "player-guessed",
        ({ playerId, playerName, guess, attemptsLeft, correct }) => {
          if (correct) soundCorrect();
          else soundWrong();
          addMsg(correct ? "correct" : "wrong", guess, {
            playerId,
            playerName,
            correct,
            showResult: true,
          });
        },
      );

      socket.on("reaction", ({ emoji, playerName }) => {
        showFloatReaction(emoji, playerName);
      });

      socket.on(
        "game-won",
        ({ winnerId, winnerName, answer, scores, streakCount }) => {
          stopTimer();
          S.gameStatus = "round-over";
          S.canGuess = false;
          S.streakMap = {};
          if (streakCount >= 2) S.streakMap[winnerId] = streakCount;
          scores.forEach((s) => {
            const p = S.players.find((x) => x.id === s.id);
            if (p) p.score = s.score;
          });
          renderPlayers();
          renderControls();
          updateRoundDisplay();
          const isMe = winnerId === S.playerId;
          const streak = streakCount >= 2 ? ` 🔥 ${streakCount} in a row!` : "";
          soundWin();
          launchConfetti();
          addMsg(
            "win-ann",
            `🏆 ${isMe ? "You won! 🎉" : `${esc(winnerName)} wins!`}${streak}<br>
     <span style="opacity:.75;font-size:12px;font-weight:400">Answer: <strong>${esc(answer)}</strong> · +10 points</span>`,
          );
        },
      );

      socket.on("game-timeout", ({ answer, scores, reason }) => {
        stopTimer();
        S.gameStatus = "round-over";
        S.canGuess = false;
        scores.forEach((s) => {
          const p = S.players.find((x) => x.id === s.id);
          if (p) p.score = s.score;
        });
        renderPlayers();
        renderControls();
        updateRoundDisplay();
        addMsg(
          "timeout-ann",
          `⏱ ${esc(reason || "Time's up!")}<br>
     <span style="opacity:.75;font-size:12px;font-weight:400">The answer was: <strong>${esc(answer)}</strong></span>`,
        );
      });

      socket.on(
        "new-round",
        ({
          gameMasterId,
          gameMasterName,
          players,
          scores,
          roundNumber,
          totalRounds,
        }) => {
          S.gameMasterId = gameMasterId;
          S.isGM = gameMasterId === S.playerId;
          S.players = players;
          S.gameStatus = "waiting";
          S.questionSet = false;
          S.question = null;
          S.attemptsLeft = 3;
          S.canGuess = true;
          S.myReady = false;
          S.readyCount = 0;
          S.nonGMCount = players.filter((p) => p.id !== gameMasterId).length;
          S.roundNumber = roundNumber || S.roundNumber;
          S.totalRounds = totalRounds || S.totalRounds;
          if (scores)
            scores.forEach((s) => {
              const p = S.players.find((x) => x.id === s.id);
              if (p) p.score = s.score;
            });
          renderPlayers();
          renderControls();
          updateRoundDisplay();
          addMsg(
            "round-ann",
            `🔄 Round ${S.roundNumber} of ${S.totalRounds} — <strong>${esc(gameMasterName)}</strong> is now Game Master.`,
          );
          if (S.isGM) showToast("🎯 Your turn! Set a question and start.");
          else showToast(`New round! ${gameMasterName} is GM.`);
        },
      );

      socket.on("new-game-master", ({ gameMasterId, gameMasterName }) => {
        S.gameMasterId = gameMasterId;
        S.isGM = gameMasterId === S.playerId;
        renderPlayers();
        renderControls();
        addMsg("sys", `${gameMasterName} is now the Game Master.`);
      });

      socket.on("game-over", ({ champion, scores }) => {
        S.gameStatus = "game-over";
        showGameOver(champion, scores);
      });

      socket.on(
        "play-again-started",
        ({
          gameMasterId,
          gameMasterName,
          players,
          roundNumber,
          totalRounds,
          readyCount,
          nonGMCount,
        }) => {
          S.gameMasterId = gameMasterId;
          S.isGM = gameMasterId === S.playerId;
          S.players = players;
          S.gameStatus = "waiting";
          S.questionSet = false;
          S.question = null;
          S.attemptsLeft = 3;
          S.canGuess = true;
          S.myReady = false;
          S.readyCount = readyCount || 0;
          S.nonGMCount = nonGMCount || 0;
          S.roundNumber = roundNumber || 1;
          S.totalRounds = totalRounds || players.length;
          S.streakMap = {};
          S.firstGameStarted = false;

          players.forEach((p, i) => {
            if (S.colorMap[p.id] === undefined)
              S.colorMap[p.id] = i % AV.length;
          });

          $("gameover").classList.remove("active");
          $("game").style.display = "";
          $("game").classList.add("active");
          $("messages").innerHTML = "";

          renderPlayers();
          renderControls();
          updateRoundDisplay();

          addMsg("sys", `🔄 New game! ${esc(gameMasterName)} is Game Master.`);
          addMsg("sys", `Scores reset. Good luck!`);

          if (S.isGM) showToast("🎯 You're Game Master! Set a question.");
          else
            showToast(
              `New game! ${gameMasterName} is GM. Click Ready when set.`,
            );
        },
      );

      /* FIX 3: Replace socket.on('reconnect') with socket.on('connect') for rejoin logic */
      socket.on("connect", () => {
        const token = localStorage.getItem("gw_token");
        const session = localStorage.getItem("gw_session");
        if (token && session && $("game").classList.contains("active")) {
          socket.emit("rejoin-session", { token, sessionId: session });
        }
      });

      /* FIX 4: New rejoined + player-reconnected events */
      socket.on("rejoined", (data) => {
        S.playerId = data.playerId;
        S.sessionId = data.sessionId;
        S.isGM = data.isGameMaster;
        S.gameMasterId = data.gameMasterId;
        S.players = data.players;
        S.gameStatus = data.gameStatus;
        S.question = data.question;
        S.attemptsLeft = data.attemptsLeft;
        S.roundNumber = data.roundNumber;
        S.totalRounds = data.totalRounds;
        S.firstGameStarted = data.firstGameStarted;
        S.readyCount = data.readyCount || 0;
        S.nonGMCount = data.nonGMCount || 0;
        S.canGuess =
          !data.isGameMaster &&
          data.attemptsLeft > 0 &&
          data.gameStatus === "in-progress";
        renderPlayers();
        renderControls();
        updateRoundDisplay();
        showToast("✅ Reconnected!");
      });

      socket.on("player-reconnected", ({ playerName, players }) => {
        S.players = players;
        renderPlayers();
        addMsg("sys", `${playerName} reconnected`);
      });

      /* FIX 4: Disconnect/reconnect feedback — old reconnect event removed above */
      socket.on("disconnect", (reason) => {
        if (reason === "io server disconnect") {
          showToast("Disconnected by server. Reloading…");
          setTimeout(() => location.reload(), 2000);
        } else {
          showToast("Connection lost — reconnecting…");
        }
      });
      socket.on("reconnect_error", () => {
        showToast("Still trying to reconnect…");
      });

      /* ── Misc ───────────────────────────────────────────────────────── */
      function copyCode() {
        navigator.clipboard
          .writeText(S.sessionId)
          .then(() => showToast("Session code copied!"));
      }

      function shareLink() {
        const url = `${location.origin}/join/${S.sessionId}`;
        navigator.clipboard
          .writeText(url)
          .then(() => showToast("🔗 Invite link copied!"))
          .catch(() => {
            prompt("Copy this link and share it:", url);
          });
      }

      let _tt;
      function showToast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(_tt);
        _tt = setTimeout(() => t.classList.remove("show"), 2500);
      }

      window.addEventListener("resize", () => {
        if (confettiRunning) {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
      });
    </script>
  </body>
</html>
